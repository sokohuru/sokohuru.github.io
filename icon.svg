    <path d="M40 190 H270 C290 190 305 175 305 155" stroke="#9EF3E5" stroke-width="14" stroke-linecap="round"/>
    <path d="M80 70 H330 L290 170 H100 Z" fill="none" stroke="#9EF3E5" stroke-width="14" stroke-linejoin="round"/>

    <!-- Cart Grid -->
    <line x1="120" y1="70" x2="105" y2="170" stroke="#9EF3E5" stroke-width="8"/>
    <line x1="170" y1="70" x2="155" y2="170" stroke="#9EF3E5" stroke-width="8"/>
    <line x1="220" y1="70" x2="205" y2="170" stroke="#9EF3E5" stroke-width="8"/>
    <line x1="270" y1="70" x2="255" y2="170" stroke="#9EF3E5" stroke-width="8"/>

    <line x1="80" y1="110" x2="315" y2="110" stroke="#9EF3E5" stroke-width="8"/>
    <line x1="90" y1="145" x2="300" y2="145" stroke="#9EF3E5" stroke-width="8"/>

    <!-- Handle -->
    <path d="M330 70 L360 10" stroke="#9EF3E5" stroke-width="14" stroke-linecap="round"/>
    <circle cx="372" cy="5" r="14" fill="#FF3B30"/>

    <!-- Wheels -->
    <circle cx="120" cy="205" r="18" fill="#2B2B2B"/>
    <circle cx="280" cy="205" r="18" fill="#2B2B2B"/>
    <circle cx="120" cy="205" r="8" fill="#9EF3E5"/>
    <circle cx="280" cy="205" r="8" fill="#9EF3E5"/>
  </g>

  <!-- Brand Text -->
  <text x="512" y="610" text-anchor="middle" font-size="120" font-family="Arial, Helvetica, sans-serif" font-weight="700" fill="white" letter-spacing="10">
    SOKO
  </text>

  <text x="512" y="735" text-anchor="middle" font-size="120" font-family="Arial, Helvetica, sans-serif" font-weight="700" fill="white" letter-spacing="10">
    HURU
  </text>

  <!-- Accent Line -->
  <line x1="400" y1="780" x2="624" y2="780" stroke="#F2C200" stroke-width="8"/>

